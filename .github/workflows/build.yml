---
name: Build Fedora

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 6"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash -eux -o pipefail {0}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Show runner info
        run: |
          sudo podman --version
          sudo buildah --version
          sudo skopeo --version

      - name: Free up disk space
        run: |
          # https://github.com/actions/runner-images/issues/10386
          sudo df -h
          sudo rm -rf /opt /usr/local /usr/share/{boost,dotnet,swift} /usr/lib/{google-cloud-sdk,jvm}
          sudo df -h

      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Container registry login
        run: |
          { set +x; } &>/dev/null
          sudo skopeo login --username '${{ github.actor }}' --password '${{ secrets.GITHUB_TOKEN }}' ghcr.io

      - name: Pull base images
        run: |
          retry() { "$@" || "$@"; }
          base_images=($(grep -E '^FROM\s.*/.*' Containerfile | awk '{print $2}'))
          retry sudo podman pull "${base_images[@]}"
          sudo podman image list

      - name: Build image
        run: |
          retry() { "$@" || "$@"; }
          retry sudo buildah build -t localhost/new-image:raw -f Containerfile .
          sudo podman image list

      - name: Rechunk image
        run: |
          # https://coreos.github.io/rpm-ostree/build-chunked-oci/
          # https://docs.fedoraproject.org/en-US/bootc/building-from-scratch/#_optimizing_container_images
          # https://gitlab.com/fedora/bootc/base-images/-/blob/main/bootc-base-imagectl
          # https://github.com/coreos/rpm-ostree/blob/main/rust/src/container.rs
          sudo podman run --rm --privileged --volume /var/lib/containers:/var/lib/containers localhost/new-image:raw \
            rpm-ostree compose build-chunked-oci --bootc --format-version=2 --max-layers=120 \
            --from=localhost/new-image:raw --output=containers-storage:localhost/new-image:rechunked
          sudo podman image list

      - name: Push image
        run: |
          retry() { "$@" || "$@"; }
          version_full="$(sudo podman image inspect --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' localhost/new-image:rechunked)"
          version_major="$(echo "$version_full" | cut -d'.' -f1)"
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            tags=("$version_major.pr-${{ github.event.number }}.build-${{ github.run_number }}" "$version_major.pr-${{ github.event.number }}")
          else
            tags=("$version_full" "$version_major.build-${{ github.run_number }}" "$version_major" 'latest')
          fi
          source_image='containers-storage:localhost/new-image:rechunked'
          compression_args=(--dest-compress-format='zstd' --dest-compress-level=9)
          for tag in "${tags[@]}"; do
            dest_image="docker://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:$tag"
            retry sudo skopeo copy "${compression_args[@]}" "$source_image" "$dest_image"
            source_image="$dest_image" # uses the pushed image as source for the next tag
            compression_args=()        # pushed image is already compressed, no need to do it again
          done
